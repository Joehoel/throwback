name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Sideloads the Sentry source-context/mapping upload (needs a secret token we don't
      # set in CI); -PsentryUpload=false makes those steps no-op so the build needs no secrets.
      - name: Tests, lint, and debug build
        run: ./gradlew test lintDebug assembleDebug -PsentryUpload=false

      - name: Upload reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            android/app/build/reports/tests/
            android/app/build/reports/lint-results-*.html
          if-no-files-found: ignore
