name: Release

# Pushing a version tag cuts a release: build a signed APK whose version comes from the tag,
# then publish it as a GitHub Release. Cut one with:  git tag v1.2.0 && git push origin v1.2.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed to create the GitHub Release and upload the APK asset

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Read the cache main built, but don't write release runs into it.
          cache-read-only: true

      - name: Decode the release keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "::error::SIGNING_KEYSTORE_BASE64 secret is not set — see scripts/README or the release docs to create the keystore + secrets."
            exit 1
          fi
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "SIGNING_KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Build the signed release APK
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          SIGNING_KEYSTORE_FILE: ${{ env.SIGNING_KEYSTORE_FILE }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          # Uploading source context/mappings to Sentry needs the auth token; without it, skip
          # the upload so the release still builds. (With it set, the upload happens normally.)
          EXTRA=""
          if [ -z "$SENTRY_AUTH_TOKEN" ]; then EXTRA="-PsentryUpload=false"; fi
          ./gradlew assembleRelease $EXTRA

      - name: Name the APK after the version
        run: |
          mkdir -p "$RUNNER_TEMP/out"
          cp app/build/outputs/apk/release/app-release.apk "$RUNNER_TEMP/out/throwback-${GITHUB_REF_NAME}.apk"

      - name: Publish the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          files: ${{ runner.temp }}/out/throwback-${{ github.ref_name }}.apk
          generate_release_notes: true
